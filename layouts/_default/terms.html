{{ define "main" }}
<section class="page-hero">
  <div class="container">
    <p class="eyebrow">Index</p>
    <h1>{{ .Title }}</h1>
    {{ with .Description }}<p class="lead">{{ . }}</p>{{ end }}
  </div>
</section>

<section class="page-content">
  <div class="container">
    <ul class="terms-list">
      {{ range .Data.Terms.Alphabetical }}
      <li><a href="{{ .Page.RelPermalink }}">{{ .Page.Title }} <span>{{ .Count }}</span></a></li>
      {{ end }}
    </ul>
  </div>
</section>
{{ end }}
